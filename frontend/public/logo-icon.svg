<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#EBE3D6"/>
    </linearGradient>
    <linearGradient id="canopyGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B5D0BF"/>
      <stop offset="100%" stop-color="#A8C4B0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect (for Android adaptive icon shape) -->
  <rect width="512" height="512" rx="106" fill="url(#bgGrad)"/>

  <!-- Subtle border ring -->
  <rect x="10" y="10" width="492" height="492" rx="96" fill="none" stroke="#A8C4B0" stroke-width="1.2" opacity="0.35"/>

  <!-- ===== FAINT CITY SKYLINE ===== -->
  <g fill="#1A2E2A" opacity="0.08">
    <rect x="90" y="360" width="12" height="38" rx="1.5"/>
    <rect x="106" y="350" width="16" height="48" rx="1.5"/>
    <rect x="128" y="365" width="10" height="33" rx="1.5"/>
    <rect x="144" y="345" width="18" height="53" rx="1.5"/>
    <rect x="168" y="358" width="12" height="40" rx="1.5"/>
    <rect x="352" y="355" width="14" height="43" rx="1.5"/>
    <rect x="370" y="345" width="18" height="53" rx="1.5"/>
    <rect x="394" y="362" width="12" height="36" rx="1.5"/>
    <rect x="410" y="350" width="16" height="48" rx="1.5"/>
    <rect x="430" y="360" width="14" height="38" rx="1.5"/>
  </g>

  <!-- ===== GROUND ===== -->
  <path d="M56 405 Q180 380 256 392 Q340 378 456 405 L456 430 L56 430 Z" fill="#A8C4B0" opacity="0.12"/>

  <!-- ===== TREE ===== -->
  <!-- Trunk -->
  <path d="M220 405 Q216 350 222 295" stroke="#1A2E2A" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <path d="M228 405 Q232 355 225 295" stroke="#1A2E2A" stroke-width="4.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Small branch -->
  <path d="M224 340 Q240 330 250 332" stroke="#1A2E2A" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Canopy - layered rounded shapes -->
  <g fill="url(#canopyGrad)" opacity="0.92">
    <ellipse cx="210" cy="270" rx="60" ry="48"/>
    <ellipse cx="250" cy="252" rx="55" ry="44"/>
    <ellipse cx="180" cy="262" rx="45" ry="38"/>
    <ellipse cx="228" cy="238" rx="50" ry="38"/>
    <ellipse cx="200" cy="245" rx="38" ry="32"/>
  </g>

  <!-- Canopy highlight -->
  <g fill="#F5F0E8" opacity="0.15">
    <ellipse cx="225" cy="238" rx="28" ry="18"/>
    <ellipse cx="195" cy="248" rx="20" ry="14"/>
  </g>

  <!-- ===== PERSON SITTING UNDER TREE ===== -->
  <g fill="none" stroke="#1A2E2A" stroke-linecap="round" opacity="0.65">
    <!-- Head -->
    <circle cx="280" cy="338" r="12" fill="#1A2E2A" fill-opacity="0.1"/>
    <!-- Spine/back -->
    <path d="M278 350 Q272 368 276 385" stroke-width="4.5"/>
    <!-- Crossed legs -->
    <path d="M276 385 Q290 375 296 384 Q290 390 276 388" stroke-width="3.5"/>
    <path d="M276 385 Q262 377 258 386 Q264 391 276 388" stroke-width="3.5"/>
    <!-- Arms resting -->
    <path d="M274 358 Q262 372 266 382" stroke-width="3"/>
    <path d="M278 358 Q290 370 294 378" stroke-width="3"/>
  </g>

  <!-- Peace/zen dot accent -->
  <circle cx="210" cy="410" r="2.5" fill="#A8C4B0" opacity="0.4"/>
  <circle cx="256" cy="416" r="1.5" fill="#A8C4B0" opacity="0.3"/>
  <circle cx="300" cy="410" r="2.5" fill="#A8C4B0" opacity="0.4"/>
</svg>
