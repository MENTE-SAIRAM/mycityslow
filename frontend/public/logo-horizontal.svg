<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" fill="none">
  <defs>
    <linearGradient id="canopyGradH" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B5D0BF"/>
      <stop offset="100%" stop-color="#A8C4B0"/>
    </linearGradient>
  </defs>

  <!-- ===== ICON (half-size scene) ===== -->
  <g transform="translate(65, 65) scale(0.6)">
    <!-- Faint city skyline -->
    <g fill="#1A2E2A" opacity="0.07">
      <rect x="-72" y="-10" width="10" height="30" rx="1.5"/>
      <rect x="-58" y="-18" width="14" height="38" rx="1.5"/>
      <rect x="-40" y="-6" width="8" height="26" rx="1.5"/>
      <rect x="-28" y="-22" width="14" height="42" rx="1.5"/>
      <rect x="-10" y="-12" width="10" height="32" rx="1.5"/>
      <rect x="70" y="-14" width="12" height="34" rx="1.5"/>
      <rect x="86" y="-22" width="14" height="42" rx="1.5"/>
      <rect x="104" y="-8" width="10" height="28" rx="1.5"/>
      <rect x="118" y="-18" width="12" height="38" rx="1.5"/>
    </g>

    <!-- Ground -->
    <path d="M-100 30 Q-60 8 0 18 Q60 6 100 30 L100 50 L-100 50 Z" fill="#A8C4B0" opacity="0.1"/>

    <!-- Tree trunk -->
    <path d="M-20 32 Q-24 -10 -18 -55" stroke="#1A2E2A" stroke-width="4.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M-14 32 Q-10 -8 -16 -55" stroke="#1A2E2A" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
    <path d="M-16 -20 Q-2 -28 6 -26" stroke="#1A2E2A" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

    <!-- Tree canopy -->
    <g fill="url(#canopyGradH)" opacity="0.92">
      <ellipse cx="-20" cy="-72" rx="52" ry="42"/>
      <ellipse cx="12" cy="-86" rx="48" ry="38"/>
      <ellipse cx="-45" cy="-78" rx="38" ry="32"/>
      <ellipse cx="-6" cy="-98" rx="42" ry="32"/>
      <ellipse cx="-28" cy="-92" rx="32" ry="26"/>
    </g>

    <!-- Canopy highlight -->
    <g fill="#F5F0E8" opacity="0.12">
      <ellipse cx="-4" cy="-98" rx="24" ry="14"/>
      <ellipse cx="-30" cy="-90" rx="16" ry="10"/>
    </g>

    <!-- Person -->
    <g fill="none" stroke="#1A2E2A" stroke-linecap="round" opacity="0.55">
      <circle cx="38" cy="-12" r="10" fill="#1A2E2A" fill-opacity="0.08"/>
      <path d="M36 0 Q31 12 34 25" stroke-width="4"/>
      <path d="M34 25 Q46 16 50 24 Q46 28 34 26" stroke-width="3"/>
      <path d="M34 25 Q22 18 20 26 Q24 30 34 26" stroke-width="3"/>
      <path d="M33 4 Q24 14 26 22" stroke-width="2.5"/>
      <path d="M36 4 Q46 14 48 20" stroke-width="2.5"/>
    </g>

    <!-- Zen dots -->
    <circle cx="-30" cy="40" r="2" fill="#A8C4B0" opacity="0.35"/>
    <circle cx="0" cy="44" r="1.5" fill="#A8C4B0" opacity="0.25"/>
    <circle cx="30" cy="40" r="2" fill="#A8C4B0" opacity="0.35"/>
  </g>

  <!-- ===== TYPOGRAPHY ===== -->
  <!-- "MY" smaller, above -->
  <text x="130" y="44" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="13" fill="#1A2E2A" opacity="0.45" letter-spacing="4.5" font-weight="400">M Y</text>

  <!-- "City Slow" -->
  <text x="130" y="75" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="32" font-weight="600" fill="#1A2E2A" letter-spacing="3">City  Slow</text>

  <!-- Tagline -->
  <text x="130" y="97" font-family="'Inter', Arial, Helvetica, sans-serif" font-size="9.5" fill="#A8C4B0" letter-spacing="3.5" font-weight="300">DISCOVER THE PEACEFUL SIDE OF YOUR CITY</text>

  <!-- Accent dot -->
  <circle cx="120" cy="60" r="2.5" fill="#A8C4B0" opacity="0.4"/>
</svg>
